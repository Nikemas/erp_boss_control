<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Boss Control — Дордой ERP</title>
    <style>
      /* Claude design tokens — polyfill для локального запуска */
      :root {
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --font-mono: "SF Mono", "Fira Code", Consolas, monospace;
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #666;
        --color-text-tertiary: #999;
        --color-text-success: #3B6D11;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f3;
        --color-border-primary: #1a1a1a;
        --color-border-secondary: #ccc;
        --color-border-tertiary: #e5e5e5;
        --color-border-info: #185FA5;
        --color-border-success: #3B6D11;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #f0ede8;
        font-family: var(--font-sans);
        min-height: 100vh;
      }
      button { font-family: inherit; }
      textarea { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
